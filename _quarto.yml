project:
  type: book
  output-dir: _book
  resources:
    - code/**

book:
  title: "Data Science Workflows in R"
  author: "OIT Research Technology Services"
  reader-mode: false
  cover-image: images/r_logo.png
  sidebar:
    logo: images/logo_stack.svg
    pinned: true
  page-footer:
    right: <a href="http://creativecommons.org/licenses/by-sa/4.0/"><img src="https://i.creativecommons.org/l/by-sa/4.0/88x31.png"></a>
  site-url: https://southernmethodistuniversity.github.io/data-science-r/
  repo-url: https://github.com/SouthernMethodistUniversity/data-science-r
  repo-branch: main
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: intro.qmd
      chapters:
        - setup.qmd
    - part: data_prep.qmd
      chapters:
        - data_load.qmd
        - data_clean.qmd
        - eda.qmd
    - part: model.qmd
      chapters:
        - linear_reg.qmd
        - extrapolation.qmd
        - train_test_split.qmd
        - logistic_reg.qmd
    - next_steps.qmd

format:
  html:
    theme: cosmo
    code-link: true
    author-meta: "SMU OIT Research Technology Services"
    callout-appearance: simple

editor: source
